[fonts]
# Headers 1, 2, 3, 4, 5, 6.
headers = [
    { family = "Be Vietnam Pro", size = 20, weight = "bold",   style = "italic" },
    { family = "Be Vietnam Pro", size = 16, weight = "bold",   style = "normal" },
    { family = "Be Vietnam Pro", size = 14, weight = "bold", style = "italic" },
    { family = "Be Vietnam Pro", size = 15, weight = "bold",   style = "italic" },
    { family = "Be Vietnam Pro", size = 14, weight = "normal", style = "normal" },
    { family = "Be Vietnam Pro", size = 13, weight = "bold",   style = "normal" }
]

paragraph = { family = "Be Vietnam Pro", size = 12, weight = "normal", style = "normal" }

caption = { family = "Be Vietnam Pro", size = 12, weight = "normal", style = "italic" }

page_number = { family = "Be Vietnam Pro", size = 10, weight = "bold", style = "normal" }

[image_block]
# Additional scaling applied after fitting the image to the page width.
# For example, `0.1` applies a further 10% reduction.
reduction_factor = 1.0
# Whether to horizontally center the image and its caption. Only meaningful when
# the scaled image is narrower than the page width. (The caption width is always
# equal to `a4_default_content_width()`.)
centre_aligned = true
# Factor used to progressively reduce the image scale when attempting to make
# the image block fit in the available vertical space.
step_scale_factor = 0.05
# The minimum acceptable scale factor. If the scale falls below this value,
# layout is considered to have failed.
min_allowed_scale = 0.20

[block_spacing.heading]
before = [120.0, 40.0, 30.0, 20.0, 20.0, 20.0]
after = [15.0, 13.0, 0.0, 9.0, 8.0, 6.0]

[block_spacing.paragraph]
before = 15.0
after = 0.0

[block_spacing.image]
# Vertical spacing added above the actual image to create a natural 
# visual gap after the previous block.
# If the image block happens to be on a new page, this gap is not 
# applied since there is no previous block above it.
before = 30.0
# Vertical spacing added below each image caption to create a natural
# visual gap before the next block.
after = 0.0

[block_spacing.thematic]
before = 10.0
after = 10.0

[horizontal_break]
stroke_width = 0.8
# colour = "#B3B3B3" # Equivalent to 0.7, 0.7, 0.7
colour = { r = 0.7, g = 0.7, b = 0.7 }